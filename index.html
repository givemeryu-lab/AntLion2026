<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최단거리 경로 찾기</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 100%;
            margin: 0;
            background: white;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo {
            width: 280px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid white;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
        }

        .content {
            padding: 0;
        }

        .tab-buttons {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .map-section {
            background: white;
            padding: 0;
            margin-bottom: 0;
        }

        #map {
            width: 100%;
            height: 400px;
            border-radius: 0;
            box-shadow: none;
        }

        .map-controls {
            display: flex;
            gap: 5px;
            margin: 10px 15px;
            flex-wrap: wrap;
        }

        .toggle-section {
            background: #f8f9fa;
            padding: 10px 15px;
            margin: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .toggle-section label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            margin: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: #667eea;
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        .input-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 0;
            margin-bottom: 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            background: white;
            cursor: pointer;
        }

        .route-mode-section {
            background: #fff3cd;
            padding: 15px;
            border-radius: 0;
            margin-bottom: 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .route-mode-section h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
            padding: 0;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .mode-btn {
            padding: 10px 8px;
            border: 2px solid #ffc107;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
        }

        .mode-btn:hover {
            background: #fff3cd;
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: #ffc107;
            color: white;
            border-color: #ffc107;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
            font-size: 13px;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
            font-size: 13px;
        }

        .btn-info:hover {
            background: #138496;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
            font-size: 13px;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            font-size: 13px;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .summary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            border-radius: 0;
            margin-bottom: 0;
            border-bottom: 3px solid rgba(0,0,0,0.1);
        }

        .summary h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .stat-box {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 3px;
        }

        .distance-list {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 0;
        }

        .distance-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s;
            border-left: 4px solid #667eea;
        }

        .distance-item:hover {
            transform: translateX(5px);
        }

        .distance-info {
            flex: 1;
        }

        .distance-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .distance-address {
            font-size: 11px;
            color: #666;
        }

        .distance-value {
            background: #e7f3ff;
            color: #0066cc;
            padding: 5px 10px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 12px;
            white-space: nowrap;
        }

        .distance-value.close {
            background: #d4edda;
            color: #155724;
        }

        .distance-value.far {
            background: #fff3cd;
            color: #856404;
        }

        .point-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 5px;
        }

        .point-badge.two {
            background: #28a745;
        }

        .export-section {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 0;
            margin-bottom: 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .export-section h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .export-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .route-list {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 0;
        }

        .route-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .route-item.return {
            border-left-color: #28a745;
        }

        .route-number {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
            margin-right: 10px;
            font-size: 13px;
        }

        .route-number.return {
            background: #28a745;
        }

        .route-info {
            display: inline-block;
            vertical-align: middle;
            width: calc(100% - 120px);
        }

        .route-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .route-address {
            font-size: 11px;
            color: #666;
        }

        .route-distance {
            float: right;
            background: #e7f3ff;
            color: #0066cc;
            padding: 5px 8px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 11px;
        }

        .loading {
            text-align: center;
            padding: 30px 15px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 12px;
        }

        .error {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px 15px;
            border-radius: 0;
            margin-bottom: 0;
            display: none;
            font-size: 13px;
        }

        .error.show {
            display: block;
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px 15px;
            border-radius: 0;
            margin-bottom: 0;
            display: none;
            font-size: 13px;
        }

        .success-message.show {
            display: block;
        }

        .file-upload-section {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 0;
            margin-bottom: 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .file-upload-section h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px;
            background: white;
            border: 2px dashed #17a2b8;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .file-input-label:hover {
            background: #f0f9ff;
            border-color: #138496;
        }

        .file-input-label.has-file {
            background: #d4edda;
            border-color: #28a745;
            border-style: solid;
        }

        .gps-button {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            width: 100%;
        }

        .gps-button:hover {
            background: #138496;
        }

        .selected-points {
            background: white;
            padding: 10px 15px;
            margin-top: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            color: #667eea;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <img src="https://github.com/givemeryu-lab/AntLion2026/blob/main/2026-05-20_002.jpg?raw=true" alt="Logo" class="logo">
                <div>
                    <h1>🗺️ 최단거리 경로 찾기</h1>
                </div>
            </div>
            <p>출발지를 입력하고 목표 포인트를 선택하세요</p>
        </div>

        <div class="content">
            <div class="map-section">
                <div class="map-controls">
                    <button class="btn-warning" onclick="fitMapBounds()">🔍 전체보기</button>
                    <button class="btn-info" onclick="showRouteOnMap()">🔄 새로고침</button>
                    <button class="btn-danger" onclick="clearCurrentLocation()" id="clearLocationBtn" style="display:none;">🗑️ 현재위치 삭제</button>
                </div>
                <div id="map"></div>
            </div>

            <div class="toggle-section">
                <label>📍 지도 포인트 표시</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="markerToggle" checked onchange="toggleMarkers()">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('route')">🚗 경로 계획</button>
                <button class="tab-btn" onclick="switchTab('current')">📍 현재 위치</button>
            </div>

            <div id="routeTab" class="tab-content active">
                <div class="input-section">
                    <div class="input-group">
                        <label>📍 출발지 주소</label>
                        <input type="text" id="startAddress" placeholder="예: 서울특별시 강남구 테헤란로 152">
                    </div>
                    <div class="input-group">
                        <label>또는 좌표 입력 (위도, 경도)</label>
                        <input type="text" id="startCoords" placeholder="예: 37.5665, 126.9780">
                    </div>
                </div>

                <div class="route-mode-section">
                    <h3>🎯 목표 포인트 선택 (1점 ~ 24점)</h3>
                    <div class="mode-buttons" id="modeButtons"></div>
                    <div class="selected-points">선택된 포인트: <span id="selectedPointsDisplay">15점</span></div>
                </div>

                <div class="input-section">
                    <div class="button-group">
                        <button class="btn-primary" id="calculateBtn" onclick="calculateRoute()">🚀 최단경로 계산</button>
                        <button class="btn-secondary" onclick="resetForm()">🔄 초기화</button>
                    </div>
                </div>

                <div class="file-upload-section">
                    <h3>📂 GPX 파일 불러오기</h3>
                    <div class="file-input-wrapper">
                        <input type="file" id="gpxFile" accept=".gpx" onchange="handleGPXUpload(event)">
                        <label for="gpxFile" class="file-input-label" id="fileLabel">
                            📁 GPX 파일 선택
                        </label>
                    </div>
                </div>

                <div class="error" id="errorMsg"></div>
                <div class="success-message" id="successMsg"></div>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p id="loadingText">최적 경로를 계산중입니다...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
                    </div>
                </div>

                <div class="results" id="results">
                    <div class="summary">
                        <h2>📊 경로 요약</h2>
                        <div class="summary-stats">
                            <div class="stat-box">
                                <div class="stat-label">총 거리 (왕복)</div>
                                <div class="stat-value" id="totalDistance">0 km</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">방문 지점</div>
                                <div class="stat-value" id="visitCount">0곳 + 복귀</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">획득 포인트</div>
                                <div class="stat-value" id="totalPoints">0점</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">예상 소요시간</div>
                                <div class="stat-value" id="totalTime">0시간</div>
                            </div>
                        </div>
                    </div>

                    <div class="export-section">
                        <h3>📥 경로 파일 다운로드</h3>
                        <div class="export-buttons">
                            <button class="btn-success" onclick="downloadGPX()">
                                📍 GPX 다운로드
                            </button>
                            <button class="btn-info" onclick="downloadKML()">
                                🗺️ KML 다운로드
                            </button>
                        </div>
                    </div>

                    <div class="route-list">
                        <h3 style="margin-bottom: 15px; color: #333; font-size: 16px;">🛣️ 방문 순서</h3>
                        <div id="routeList"></div>
                    </div>
                </div>
            </div>

            <div id="currentTab" class="tab-content">
                <div class="input-section">
                    <div class="input-group">
                        <label>📍 현재 위치 주소</label>
                        <input type="text" id="currentAddress" placeholder="예: 서울특별시 강남구 테헤란로 152">
                    </div>
                    <div class="input-group">
                        <label>또는 좌표 입력 (위도, 경도)</label>
                        <input type="text" id="currentCoords" placeholder="예: 37.5665, 126.9780">
                    </div>
                    <button class="gps-button" onclick="getCurrentGPS()">📡 GPS로 현재 위치 가져오기</button>
                    <div class="button-group">
                        <button class="btn-primary" id="checkDistanceBtn" onclick="checkDistances()">📏 거리 확인</button>
                    </div>
                </div>

                <div class="error" id="errorMsg2"></div>
                <div class="success-message" id="successMsg2"></div>
                
                <div class="loading" id="loading2">
                    <div class="spinner"></div>
                    <p id="loadingText2">거리를 계산중입니다...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill2" style="width: 0%">0%</div>
                    </div>
                </div>

                <div class="results" id="distanceResults">
                    <div class="summary">
                        <h2>📍 현재 위치 기준 거리</h2>
                        <div class="summary-stats">
                            <div class="stat-box">
                                <div class="stat-label">가장 가까운 곳</div>
                                <div class="stat-value" id="nearestPlace">-</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">최단 거리</div>
                                <div class="stat-value" id="nearestDistance">0 km</div>
                            </div>
                        </div>
                    </div>

                    <div class="distance-list">
                        <h3 style="margin-bottom: 15px; color: #333; font-size: 16px;">📏 각 지점까지의 거리</h3>
                        <div id="distanceList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const allLocations = [
            { id: 1, name: 'GPC (굿피플초이스)', address: '서울 양천구 중앙로 245 1층', lat: 37.5243, lng: 126.8555, points: 1 },

            { id: 3, name: '원진방앗간', address: '경기 화성시 향남읍 삼천병마로 188 1층', lat: 37.1297, lng: 126.9101, points: 1 },

        function getOptimalLocations(startLat, startLng, targetPoints) {
            if (targetPoints === 'all' || targetPoints === 24) {
                return allLocations;
            }

            const target = parseInt(targetPoints);
            
            const locationsWithDistance = allLocations.map(loc => ({
                ...loc,
                straightDistance: getDistance(startLat, startLng, loc.lat, loc.lng)
            }));

            locationsWithDistance.forEach(loc => {
                loc.efficiency = loc.points / (loc.straightDistance + 1);
            });

            const selected = [];
            let currentPoints = 0;
            const remaining = [...locationsWithDistance];

            remaining.sort((a, b) => b.efficiency - a.efficiency);

            for (const loc of remaining) {
                if (currentPoints >= target) break;
                selected.push(loc);
                currentPoints += loc.points;
            }

            if (currentPoints >= target) {
                selected.sort((a, b) => a.points - b.points);
                
                while (currentPoints > target) {
                    let removed = false;
                    for (let i = 0; i < selected.length; i++) {
                        if (currentPoints - selected[i].points >= target) {
                            currentPoints -= selected[i].points;
                            selected.splice(i, 1);
                            removed = true;
                            break;
                        }
                    }
                    if (!removed) break;
                }
            }

            return selected;
        }

        async function getRoadRoute(fromLat, fromLng, toLat, toLng) {
            try {
                const url = `https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                    return {
                        distance: data.routes[0].distance / 1000,
                        duration: data.routes[0].duration / 60,
                        geometry: data.routes[0].geometry.coordinates
                    };
                }
                return null;
            } catch (error) {
                console.error('OSRM API 오류:', error);
                return null;
            }
        }

        async function nearestNeighborWithRoads(startLat, startLng, locations, progressCallback) {
            const unvisited = [...locations];
            const route = [];
            let currentLat = startLat;
            let currentLng = startLng;
            let totalDistance = 0;
            let totalDuration = 0;
            const allGeometry = [];

            const totalSteps = locations.length + 1;
            let currentStep = 0;

            while (unvisited.length > 0) {
                let nearestIndex = 0;
                let minDistance = Infinity;
                let bestRoute = null;

                for (let i = 0; i < unvisited.length; i++) {
                    const roadRoute = await getRoadRoute(
                        currentLat, currentLng,
                        unvisited[i].lat, unvisited[i].lng
                    );
                    
                    if (roadRoute && roadRoute.distance < minDistance) {
                        minDistance = roadRoute.distance;
                        nearestIndex = i;
                        bestRoute = roadRoute;
                    }
                    
                    const searchProgress = (i + 1) / unvisited.length * 0.5;
                    const overallProgress = ((currentStep + searchProgress) / totalSteps) * 100;
                    if (progressCallback) {
                        progressCallback(overallProgress, `${locations.length - unvisited.length + 1}번째 경로 계산 중...`);
                    }
                }

                if (!bestRoute) {
                    const nearest = unvisited[nearestIndex];
                    const straightDist = getDistance(currentLat, currentLng, nearest.lat, nearest.lng);
                    bestRoute = {
                        distance: straightDist,
                        duration: straightDist * 1.2,
                        geometry: [[currentLng, currentLat], [nearest.lng, nearest.lat]]
                    };
                }

                const nearest = unvisited[nearestIndex];
                route.push({
                    location: nearest,
                    distance: bestRoute.distance,
                    duration: bestRoute.duration,
                    geometry: bestRoute.geometry
                });

                allGeometry.push(bestRoute.geometry);
                totalDistance += bestRoute.distance;
                totalDuration += bestRoute.duration;
                currentLat = nearest.lat;
                currentLng = nearest.lng;
                unvisited.splice(nearestIndex, 1);

                currentStep++;
                const overallProgress = (currentStep / totalSteps) * 100;
                if (progressCallback) {
                    progressCallback(overallProgress, `${route.length}개 지점 경로 완료`);
                }
            }

            if (progressCallback) {
                progressCallback(95, '출발지 복귀 경로 계산 중...');
            }

            const returnRoute = await getRoadRoute(currentLat, currentLng, startLat, startLng);
            if (returnRoute) {
                route.push({
                    location: { name: '출발지 복귀', address: '왕복 완료', lat: startLat, lng: startLng, points: 0 },
                    distance: returnRoute.distance,
                    duration: returnRoute.duration,
                    geometry: returnRoute.geometry,
                    isReturn: true
                });
                allGeometry.push(returnRoute.geometry);
                totalDistance += returnRoute.distance;
                totalDuration += returnRoute.duration;
            }

            if (progressCallback) {
                progressCallback(100, '경로 계산 완료!');
            }

            return { route, totalDistance, totalDuration, allGeometry };
        }

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

                    iconAnchor: [17.5, 17.5]
                });

                L.marker([startPoint.lat, startPoint.lng], { icon: startIcon })
                    .bindPopup('<b>출발지 / 도착지</b>')
                    .addTo(markersLayer);

                currentRoute.forEach((item, index) => {
                    if (item.isReturn) return;

                    const bgColor = item.location.points === 1 ? '#ff6b6b' : '#4ecdc4';

                    const markerIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background-color: ${bgColor}; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-size: 12px;">${index + 1}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });

                    L.marker([item.location.lat, item.location.lng], { icon: markerIcon })
                        .bindPopup(`
                            <b>${index + 1}. ${item.location.name}</b><br>
                            ${item.location.address}<br>
                            <small>포인트: ${item.location.points}점 | 거리: ${item.distance.toFixed(1)} km | 소요시간: ${Math.round(item.duration)}분</small>
                        `)
                        .addTo(markersLayer);
                });

                fitMapBounds();
                showSuccessMessage('✅ 지도에 경로가 표시되었습니다!');
            }
            else if (activeTab === 'current' && currentLocationPoint && distanceRoutes.length) {
                showAllRoutesFromCurrentLocation();
                showSuccessMessage2('✅ 모든 경로를 지도에 표시했습니다!');
            }
            else {
                showDefaultLocations();
            }
        }

        function fitMapBounds() {
            if (!map) return;

            let bounds;
            
            if (routeLayer && routeLayer.getLayers().length > 0) {
                const allLatLngs = [];
                routeLayer.eachLayer(layer => {
                    if (layer instanceof L.Polyline) {
                        allLatLngs.push(...layer.getLatLngs());
                    }
                });
                if (allLatLngs.length > 0) {
                    bounds = L.latLngBounds(allLatLngs);
                    map.fitBounds(bounds, { padding: [30, 30] });
                    return;
                }
            }
            
            if (markersLayer && markersLayer.getLayers().length > 0) {
                const allLatLngs = [];
                markersLayer.eachLayer(layer => {
                    if (layer instanceof L.Marker) {
                        allLatLngs.push(layer.getLatLng());
                    }
                });
                if (allLatLngs.length > 0) {
                    bounds = L.latLngBounds(allLatLngs);
                    map.fitBounds(bounds, { padding: [30, 30] });
                    return;
                }
            }
            
            bounds = L.latLngBounds(allLocations.map(loc => [loc.lat, loc.lng]));
            map.fitBounds(bounds, { padding: [30, 30] });
        }

        function handleGPXUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const fileLabel = document.getElementById('fileLabel');
            fileLabel.textContent = `📄 ${file.name}`;
            fileLabel.classList.add('has-file');

            const reader = new FileReader();
            reader.onload = function(e) {
                const gpxContent = e.target.result;
                parseAndDisplayGPX(gpxContent);
            };
            reader.readAsText(file);
        }

        function parseAndDisplayGPX(gpxContent) {
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(gpxContent, 'text/xml');
                
                const trkpts = xmlDoc.getElementsByTagName('trkpt');
                const wpts = xmlDoc.getElementsByTagName('wpt');
                
                if (trkpts.length === 0 && wpts.length === 0) {
                    throw new Error('GPX 파일에 유효한 경로 정보가 없습니다.');
                }

                initMap();
                routeLayer.clearLayers();
                markersLayer.clearLayers();

                const routeCoords = [];
                
                for (let i = 0; i < trkpts.length; i++) {
                    const lat = parseFloat(trkpts[i].getAttribute('lat'));
                    const lng = parseFloat(trkpts[i].getAttribute('lon'));
                    routeCoords.push([lat, lng]);
                }

                if (routeCoords.length > 0) {
                    const polyline = L.polyline(routeCoords, {
                        color: '#28a745',
                        weight: 4,
                        opacity: 0.7
                    }).addTo(routeLayer);
                    
                    map.fitBounds(polyline.getBounds(), { padding: [30, 30] });
                }

                for (let i = 0; i < wpts.length; i++) {
                    const lat = parseFloat(wpts[i].getAttribute('lat'));
                    const lng = parseFloat(wpts[i].getAttribute('lon'));
                    const nameEl = wpts[i].getElementsByTagName('name')[0];
                    const descEl = wpts[i].getElementsByTagName('desc')[0];
                    
                    const name = nameEl ? nameEl.textContent : `Point ${i + 1}`;
                    const desc = descEl ? descEl.textContent : '';

                    let markerIcon;
                    if (name.includes('출발지')) {
                        markerIcon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div style="background-color: #0066ff; color: white; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-size: 11px;">출발</div>`,
                            iconSize: [35, 35],
                            iconAnchor: [17.5, 17.5]
                        });
                    } else {
                        markerIcon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div style="background-color: #28a745; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-size: 12px;">${i}</div>`,
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        });
                    }

                    L.marker([lat, lng], { icon: markerIcon })
                        .bindPopup(`<b>${name}</b><br>${desc}`)
                        .addTo(markersLayer);
                }

                document.getElementById('results').classList.add('show');
                showSuccessMessage('✅ GPX 파일이 지도에 표시되었습니다!');
                
                document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = `❌ GPX 파일 파싱 실패: ${error.message}`;
                errorMsg.classList.add('show');
            }
        }

        const fileLabel = document.getElementById('fileLabel');
        
        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.style.borderColor = '#667eea';
            fileLabel.style.background = '#f0f4ff';
        });

        fileLabel.addEventListener('dragleave', (e) => {
            e.preventDefault();
            fileLabel.style.borderColor = '#17a2b8';
            fileLabel.style.background = 'white';
        });

        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.style.borderColor = '#17a2b8';
            fileLabel.style.background = 'white';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('gpxFile').files = files;
                handleGPXUpload({ target: { files: files } });
            }
        });

        function generateGPX(startPoint, route, allGeometry) {
            const now = new Date().toISOString();
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="최단거리경로찾기" xmlns="http://www.topografix.com/GPX/1/1">
    <metadata>
        <name>최단거리 방문 경로 (왕복) - ${selectedMode}포인트</name>
        <time>${now}</time>
    </metadata>
    <trk>
        <name>방문 경로</name>
        <trkseg>
`;

            allGeometry.forEach(segment => {
                segment.forEach(coord => {
                    gpx += `            <trkpt lat="${coord[1]}" lon="${coord[0]}">
            </trkpt>
`;
                });
            });

            gpx += `        </trkseg>
    </trk>
`;

            gpx += `    <wpt lat="${startPoint.lat}" lon="${startPoint.lng}">
        <name>출발지/도착지</name>
        <sym>Flag, Blue</sym>
    </wpt>
`;

            route.forEach((item, index) => {
                if (item.isReturn) return;
                gpx += `    <wpt lat="${item.location.lat}" lon="${item.location.lng}">
        <name>${index + 1}. ${item.location.name}</name>
        <desc>${item.location.address} (${item.location.points}점, ${item.distance.toFixed(1)}km)</desc>
        <sym>Pin, Red</sym>
    </wpt>
`;
            });

            gpx += `</gpx>`;
            return gpx;
        }

        function generateKML(startPoint, route, allGeometry) {
            let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
    <Document>
        <name>최단거리 방문 경로 (왕복) - ${selectedMode}포인트</name>
        <description>최적 경로 + 출발지 복귀</description>
        
        <Style id="startStyle">
            <IconStyle>
                <color>ff0000ff</color>
                <scale>1.2</scale>
                <Icon>
                    <href>http://maps.google.com/mapfiles/kml/paddle/blu-circle.png</href>
                </Icon>
            </IconStyle>
        </Style>
        
        <Style id="waypointStyle">
            <IconStyle>
                <color>ff0000ff</color>
                <scale>1.0</scale>
                <Icon>
                    <href>http://maps.google.com/mapfiles/kml/paddle/red-circle.png</href>
                </Icon>
            </IconStyle>
        </Style>
        
        <Style id="routeStyle">
            <LineStyle>
                <color>ff0000ff</color>
                <width>4</width>
            </LineStyle>
        </Style>
        
        <Placemark>
            <name>출발지/도착지</name>
            <styleUrl>#startStyle</styleUrl>
            <Point>
                <coordinates>${startPoint.lng},${startPoint.lat},0</coordinates>
            </Point>
        </Placemark>
`;

            route.forEach((item, index) => {
                if (item.isReturn) return;
                kml += `        <Placemark>
            <name>${index + 1}. ${item.location.name}</name>
            <description>
                <![CDATA[
                    <b>주소:</b> ${item.location.address}<br/>
                    <b>포인트:</b> ${item.location.points}점<br/>
                    <b>거리:</b> ${item.distance.toFixed(1)} km<br/>
                    <b>소요시간:</b> ${Math.round(item.duration)}분
                ]]>
            </description>
            <styleUrl>#waypointStyle</styleUrl>
            <Point>
                <coordinates>${item.location.lng},${item.location.lat},0</coordinates>
            </Point>
        </Placemark>
`;
            });

            kml += `        <Placemark>
            <name>이동 경로</name>
            <styleUrl>#routeStyle</styleUrl>
            <LineString>
                <tessellate>1</tessellate>
                <coordinates>
`;

            allGeometry.forEach(segment => {
                segment.forEach(coord => {
                    kml += `                    ${coord[0]},${coord[1]},0
`;
                });
            });

            kml += `                </coordinates>
            </LineString>
        </Placemark>
    </Document>
</kml>`;
            return kml;
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function downloadGPX() {
            if (!currentRoute || !startPoint) {
                alert('먼저 경로를 계산해주세요.');
                return;
            }

            const gpxContent = generateGPX(startPoint, currentRoute, fullRouteGeometry);
            const filename = `경로_${selectedMode}pt_${new Date().toISOString().split('T')[0]}.gpx`;
            downloadFile(gpxContent, filename, 'application/gpx+xml');
            
            showSuccessMessage('✅ GPX 파일이 다운로드되었습니다!');
        }

        function downloadKML() {
            if (!currentRoute || !startPoint) {
                alert('먼저 경로를 계산해주세요.');
                return;
            }

            const kmlContent = generateKML(startPoint, currentRoute, fullRouteGeometry);
            const filename = `경로_${selectedMode}pt_${new Date().toISOString().split('T')[0]}.kml`;
            downloadFile(kmlContent, filename, 'application/vnd.google-earth.kml+xml');
            
            showSuccessMessage('✅ KML 파일이 다운로드되었습니다!');
        }

        function showSuccessMessage(message) {
            const successMsg = document.getElementById('successMsg');
            successMsg.textContent = message;
            successMsg.classList.add('show');
            
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 3000);
        }

        function showSuccessMessage2(message) {
            const successMsg2 = document.getElementById('successMsg2');
            successMsg2.textContent = message;
            successMsg2.classList.add('show');
            
            setTimeout(() => {
                successMsg2.classList.remove('show');
            }, 3000);
        }

        function updateProgress(percentage, text) {
            const progressFill = document.getElementById('progressFill');
            const loadingText = document.getElementById('loadingText');
            
            progressFill.style.width = percentage + '%';
            progressFill.textContent = Math.round(percentage) + '%';
            loadingText.textContent = text;
        }

        function updateProgress2(percentage, text) {
            const progressFill2 = document.getElementById('progressFill2');
            const loadingText2 = document.getElementById('loadingText2');
            
            progressFill2.style.width = percentage + '%';
            progressFill2.textContent = Math.round(percentage) + '%';
            loadingText2.textContent = text;
        }

        async function calculateRoute() {
            const addressInput = document.getElementById('startAddress').value.trim();
            const coordsInput = document.getElementById('startCoords').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const calculateBtn = document.getElementById('calculateBtn');

            errorMsg.classList.remove('show');
            results.classList.remove('show');

            let startLat, startLng;

            if (coordsInput) {
                const coords = coordsInput.split(',').map(s => parseFloat(s.trim()));
                if (coords.length !== 2 || isNaN(coords[0]) || isNaN(coords[1])) {
                    errorMsg.textContent = '❌ 좌표 형식이 올바르지 않습니다. (예: 37.5665, 126.9780)';
                    errorMsg.classList.add('show');
                    return;
                }
                startLat = coords[0];
                startLng = coords[1];
            } else if (addressInput) {
                loading.classList.add('show');
                updateProgress(5, '주소를 검색중입니다...');
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addressInput)}&countrycodes=kr&limit=1`);
                    const data = await response.json();
                    
                    if (data.length === 0) {
                        throw new Error('주소를 찾을 수 없습니다.');
                    }
                    
                    startLat = parseFloat(data[0].lat);
                    startLng = parseFloat(data[0].lon);
                } catch (error) {
                    loading.classList.remove('show');
                    errorMsg.textContent = `❌ 주소 검색 실패: ${error.message}. 좌표를 직접 입력해주세요.`;
                    errorMsg.classList.add('show');
                    return;
                }
            } else {
                errorMsg.textContent = '❌ 출발지 주소 또는 좌표를 입력해주세요.';
                errorMsg.classList.add('show');
                return;
            }

            loading.classList.add('show');
            calculateBtn.disabled = true;
            updateProgress(10, '최적 장소를 선택중입니다...');
            
            try {
                const selectedLocations = getOptimalLocations(startLat, startLng, selectedMode);
                
                updateProgress(15, `${selectedLocations.length}개 장소 선택 완료. 경로 계산 시작...`);
                
                const { route, totalDistance, totalDuration, allGeometry } = await nearestNeighborWithRoads(
                    startLat, startLng, selectedLocations, updateProgress
                );
                
                currentRoute = route;
                startPoint = { lat: startLat, lng: startLng };
                fullRouteGeometry = allGeometry;
                
                document.getElementById('totalDistance').textContent = totalDistance.toFixed(1) + ' km';
                const totalPoints = selectedLocations.reduce((sum, loc) => sum + loc.points, 0);
                document.getElementById('totalPoints').textContent = totalPoints + '점';
                document.getElementById('visitCount').textContent = selectedLocations.length + '곳 + 복귀';
                
                const hours = Math.floor(totalDuration / 60);
                const minutes = Math.round(totalDuration % 60);
                document.getElementById('totalTime').textContent = `${hours}시간 ${minutes}분`;
                
                const routeList = document.getElementById('routeList');
                routeList.innerHTML = '';
                
                route.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = item.isReturn ? 'route-item return' : 'route-item';
                    
                    if (item.isReturn) {
                        div.innerHTML = `
                            <span class="route-number return">🏁</span>
                            <div class="route-info">
                                <div class="route-name">${item.location.name}</div>
                                <div class="route-address">${item.location.address}</div>
                            </div>
                            <span class="route-distance">${item.distance.toFixed(1)} km / ${Math.round(item.duration)}분</span>
                        `;
                    } else {
                        div.innerHTML = `
                            <span class="route-number">${index + 1}</span>
                            <div class="route-info">
                                <div class="route-name">${item.location.name} (${item.location.points}점)</div>
                                <div class="route-address">${item.location.address}</div>
                            </div>
                            <span class="route-distance">${item.distance.toFixed(1)} km / ${Math.round(item.duration)}분</span>
                        `;
                    }
                    routeList.appendChild(div);
                });
                
                loading.classList.remove('show');
                results.classList.add('show');
                calculateBtn.disabled = false;
                
                showRouteOnMap();
                
                document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (error) {
                loading.classList.remove('show');
                calculateBtn.disabled = false;
                errorMsg.textContent = `❌ 경로 계산 실패: ${error.message}`;
                errorMsg.classList.add('show');
            }
        }

        function resetForm() {
            document.getElementById('startAddress').value = '';
            document.getElementById('startCoords').value = '';
            document.getElementById('gpxFile').value = '';
            document.getElementById('fileLabel').textContent = '📁 GPX 파일 선택';
            document.getElementById('fileLabel').classList.remove('has-file');
            document.getElementById('results').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
            document.getElementById('calculateBtn').disabled = false;
            currentRoute = null;
            startPoint = null;
            fullRouteGeometry = [];
            
            showDefaultLocations();
        }

        document.getElementById('startAddress').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateRoute();
        });

        document.getElementById('startCoords').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateRoute();
        });

        document.getElementById('currentAddress').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkDistances();
        });

        document.getElementById('currentCoords').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkDistances();
        });

        window.addEventListener('load', function() {
            initMap();
            initModeButtons();
        });
    </script>
